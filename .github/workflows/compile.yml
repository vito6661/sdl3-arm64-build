name: Build SDL3 (aarch64)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  SDL3_VERSION: "3.4.10"
  SDL3_REF: "release-3.4.10"   # tag do repositório libsdl-org/SDL

jobs:
  build-aarch64:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      #  Clona o SDL3 (não o seu repositório)                               #
      # ------------------------------------------------------------------ #
      - name: Checkout SDL3
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL
          ref: ${{ env.SDL3_REF }}

      # ------------------------------------------------------------------ #
      #  Corrige os sources.list para Ubuntu 24.04 (Noble) e adiciona arm64 #
      # ------------------------------------------------------------------ #
      - name: Adicionar arquitetura arm64 e repositórios ports
        run: |
          sudo dpkg --add-architecture arm64

          CODENAME=$(lsb_release -cs)

          # Ubuntu 24.04 usa formato DEB822 em sources.list.d/ubuntu.sources
          # Restringe todas as entradas nativas a amd64
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types:/i Architectures: amd64' \
              /etc/apt/sources.list.d/ubuntu.sources
          fi

          # Cobre também o formato legado, se ainda existir
          sudo sed -i \
            -e 's/^deb /deb [arch=amd64] /' \
            -e 's/^deb-src /deb-src [arch=amd64] /' \
            /etc/apt/sources.list 2>/dev/null || true

          # Novo arquivo com repositórios arm64 apontando para ports.ubuntu.com
          # (o único mirror oficial que hospeda arm64 para Ubuntu)
          sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null << SOURCES
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}          main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-updates  main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-security main restricted universe multiverse
          SOURCES

          sudo apt-get update

      # ------------------------------------------------------------------ #
      #  Cross-compiler + todas as dependências de desenvolvimento aarch64  #
      # ------------------------------------------------------------------ #
      - name: Instalar cross-compiler e libs de desenvolvimento aarch64
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev:arm64 \
            libxext-dev:arm64 \
            libxrandr-dev:arm64 \
            libxcursor-dev:arm64 \
            libxfixes-dev:arm64 \
            libxi-dev:arm64 \
            libxss-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libwayland-dev:arm64 \
            libwayland-client0:arm64 \
            libwayland-egl1:arm64 \
            libegl-dev:arm64 \
            libgles2-mesa-dev:arm64 \
            libgl-dev:arm64 \
            libasound2-dev:arm64 \
            libpulse-dev:arm64 \
            libudev-dev:arm64 \
            libdbus-1-dev:arm64 \
            libibus-1.0-dev:arm64 \
            libsamplerate0-dev:arm64 \
            libpipewire-0.3-dev:arm64 \
            libdecor-0-dev:arm64

      # ------------------------------------------------------------------ #
      #  Configura o CMake para cross-compile aarch64                       #
      # ------------------------------------------------------------------ #
      - name: Configurar CMake (cross-compile aarch64)
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="--sysroot=/usr/aarch64-linux-gnu" \
            -DCMAKE_EXE_LINKER_FLAGS="--sysroot=/usr/aarch64-linux-gnu" \
            -DCMAKE_SHARED_LINKER_FLAGS="--sysroot=/usr/aarch64-linux-gnu" \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_TEST_LIBRARY=OFF \
            -DSDL_TESTS=OFF
        env:
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu

      # ------------------------------------------------------------------ #
      #  Build                                                               #
      # ------------------------------------------------------------------ #
      - name: Build
        run: cmake --build build --parallel

      # ------------------------------------------------------------------ #
      #  Confirma que a lib gerada é realmente aarch64                      #
      # ------------------------------------------------------------------ #
      - name: Verificar arquitetura da lib gerada
        run: |
          file build/libSDL3.so.*.*.*
          echo "---"
          aarch64-linux-gnu-readelf -h build/libSDL3.so.*.*.* \
            | grep -E 'Class|Machine'

      # ------------------------------------------------------------------ #
      #  Salva como artefato do workflow                                     #
      # ------------------------------------------------------------------ #
      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: libSDL3-aarch64-${{ env.SDL3_VERSION }}
          path: |
            build/libSDL3.so
            build/libSDL3.so.*
          if-no-files-found: error
          retention-days: 7
