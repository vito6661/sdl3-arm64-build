name: Fast Cross-Compile SDL3 ARM64

on: workflow_dispatch

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Cross-Compilation Environment
      run: |
        # 1. Adiciona suporte a arquitetura arm64
        sudo dpkg --add-architecture arm64
        
        # 2. Atualiza a lista de pacotes (deixando o apt lidar com o espelhamento padrão)
        sudo apt-get update -y
        
        # 3. Instala o compilador cruzado e ferramentas essenciais
        # Nota: O nome correto no Ubuntu 24.04 costuma ser apenas 'pkg-config-aarch64-linux-gnu' 
        # ou apenas 'pkg-config'. Vamos instalar os compiladores principais.
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu pkg-config
        
        # 4. Instala dependências de vídeo para a arquitetura arm64
        sudo apt-get install -y libdrm-dev:arm64 libgbm-dev:arm64 libgles2-mesa-dev:arm64 libegl1-mesa-dev:arm64

    - name: Clone and Build SDL3
      run: |
        git clone https://github.com/libsdl-org/SDL.git sdl
        cd sdl && mkdir build && cd build
        
        # Configuração do CMake apontando para o cross-compiler
        cmake .. \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
          -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_FLAGS="-O2 -D_FILE_OFFSET_BITS=64 -D_GNU_SOURCE" \
          -DCMAKE_EXE_LINKER_FLAGS="-Wl,--hash-style=gnu" \
          -DSDL_SHARED=ON \
          -DSDL_STATIC=OFF \
          -DSDL_X11=OFF \
          -DSDL_WAYLAND=OFF \
          -DSDL_KMSDRM=ON \
          -DSDL_OPENGLES=ON \
          -DSDL_UNIX_CONSOLE_BUILD=ON \
          -DSDL_HIDAPI=OFF
            
        make -j$(nproc)
        
        mkdir -p ../../output
        cp libSDL3.so* ../../output/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: libSDL3-cross-arm64
        path: output/
