name: Compile SDL3 for ARM64

on:
workflow_dispatch:

jobs:
build-arm64:
runs-on: ubuntu-24.04

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Install Build Dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        git \
        cmake \
        ninja-build \
        pkg-config \
        gcc-aarch64-linux-gnu \
        g++-aarch64-linux-gnu \
        libdrm-dev \
        libgbm-dev \
        libegl1-mesa-dev

  - name: Clone SDL3
    run: |
      git clone --depth 1 https://github.com/libsdl-org/SDL.git SDL

  - name: Configure SDL3
    run: |
      cd SDL

      cmake -S . -B build \
        -G Ninja \
        -DCMAKE_SYSTEM_NAME=Linux \
        -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
        -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
        -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
        -DCMAKE_BUILD_TYPE=Release \
        -DSDL_SHARED=ON \
        -DSDL_STATIC=OFF \
        -DSDL_X11=OFF \
        -DSDL_WAYLAND=OFF \
        -DSDL_KMSDRM=ON \
        -DSDL_DUMMYVIDEO=ON \
        -DSDL_TEST_LIBRARY=OFF

  - name: Build SDL3
    run: |
      cmake --build SDL/build -j$(nproc)

  - name: Collect Artifacts
    run: |
      mkdir output

      find SDL/build -name "libSDL3.so*" -exec cp -d {} output/ \;

      ls -lah output

  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: SDL3-aarch64
      path: output/

