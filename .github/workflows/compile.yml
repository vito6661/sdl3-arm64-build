name: Build SDL3 aarch64 (glibc antiga)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  SDL3_VERSION: "3.4.10"
  SDL3_REF: "release-3.4.10"
  # Versão mínima de glibc alvo — ajuste conforme o resultado do diagnóstico
  # Valores comuns em handhelds: 2.31 (Ubuntu 20.04), 2.33, 2.35 (Ubuntu 22.04)
  GLIBC_TARGET: "2.31"

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    container:
      # Ubuntu 20.04 tem glibc 2.31 — binários compilados aqui rodam
      # em qualquer sistema com glibc >= 2.31
      image: ubuntu:20.04

    steps:
      - name: Configurar ambiente sem interação
        run: |
          echo "DEBIAN_FRONTEND=noninteractive" >> $GITHUB_ENV
          echo "TZ=UTC" >> $GITHUB_ENV

      - name: Checkout SDL3
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL
          ref: ${{ env.SDL3_REF }}

      - name: Adicionar arquitetura arm64 e repositórios ports (Focal)
        run: |
          dpkg --add-architecture arm64

          # Ubuntu 20.04 usa sources.list clássico
          sed -i \
            -e 's/^deb /deb [arch=amd64] /' \
            -e 's/^deb-src /deb-src [arch=amd64] /' \
            /etc/apt/sources.list

          tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null << SOURCES
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal          main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal-updates  main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal-security main restricted universe multiverse
          SOURCES

          apt-get update

      - name: Instalar cross-compiler e libs de desenvolvimento aarch64
        run: |
          apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            cmake \
            ninja-build \
            pkg-config \
            lsb-release \
            libx11-dev:arm64 \
            libxext-dev:arm64 \
            libxrandr-dev:arm64 \
            libxcursor-dev:arm64 \
            libxfixes-dev:arm64 \
            libxi-dev:arm64 \
            libxss-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libwayland-dev:arm64 \
            libwayland-client0:arm64 \
            libwayland-egl1:arm64 \
            libegl-dev:arm64 \
            libgles2-mesa-dev:arm64 \
            libgl-dev:arm64 \
            libasound2-dev:arm64 \
            libpulse-dev:arm64 \
            libudev-dev:arm64 \
            libdbus-1-dev:arm64 \
            libsamplerate0-dev:arm64
          # Nota: libpipewire e libdecor não existem no Focal — omitidos
          # Nota: libibus omitido (conflito glib conhecido)

      - name: Verificar versão da glibc do container
        run: |
          ldd --version | head -1
          strings /lib/aarch64-linux-gnu/libm.so.6 2>/dev/null \
            | grep "GLIBC_" | sort -V | tail -3 || true

      - name: Configurar CMake (cross-compile aarch64)
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="--sysroot=/usr/aarch64-linux-gnu" \
            -DCMAKE_EXE_LINKER_FLAGS="--sysroot=/usr/aarch64-linux-gnu" \
            -DCMAKE_SHARED_LINKER_FLAGS="--sysroot=/usr/aarch64-linux-gnu" \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_TEST_LIBRARY=OFF \
            -DSDL_TESTS=OFF \
            -DSDL_IBUS=OFF
        env:
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu

      - name: Build
        run: cmake --build build --parallel

      - name: Verificar glibc mínima exigida pela lib gerada
        run: |
          echo "=== Arquitetura ==="
          file build/libSDL3.so.*.*.*
          aarch64-linux-gnu-readelf -h build/libSDL3.so.*.*.* \
            | grep -E 'Class|Machine'

          echo ""
          echo "=== Versão mínima de GLIBC exigida ==="
          aarch64-linux-gnu-objdump -p build/libSDL3.so.*.*.* \
            | grep GLIBC || true
          aarch64-linux-gnu-readelf -V build/libSDL3.so.*.*.* 2>/dev/null \
            | grep -A2 "GLIBC_" | head -20 || true

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: libSDL3-aarch64-glibc${{ env.GLIBC_TARGET }}-${{ env.SDL3_VERSION }}
          path: |
            build/libSDL3.so
            build/libSDL3.so.*
          if-no-files-found: error
          retention-days: 30
