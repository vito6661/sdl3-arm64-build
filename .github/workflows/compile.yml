name: Compile SDL3 Native ARM64 (GLIBC 2.31)

on: workflow_dispatch

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Emulate ARM64 and Compile
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: aarch64
        distro: ubuntu20.04
        githubToken: ${{ github.token }}
        run: |
          # 1. Instala as dependências NATIVAS de vídeo para ARM64
          apt-get update -y
          DEBIAN_FRONTEND=noninteractive apt-get install -y git cmake build-essential pkg-config libdrm-dev libgbm-dev libgles2-mesa-dev
          
          # 2. Cria a pasta de saída
          mkdir -p output
          
          # 3. Baixa e compila a SDL3
          git clone https://github.com/libsdl-org/SDL.git sdl
          cd sdl && mkdir build && cd build
          
          # 4. Configuração blindada com a flag de Console/Embarcado (SDL_UNIX_CONSOLE_BUILD=ON)
          cmake .. -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=ON -DSDL_STATIC=OFF -DSDL_X11=OFF -DSDL_WAYLAND=OFF -DSDL_KMSDRM=ON -DSDL_OPENGLES=ON -DSDL_UNIX_CONSOLE_BUILD=ON
            
          make -j$(nproc)
          
          # 5. Salva a biblioteca pronta
          cp libSDL3.so* ../../output/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: libSDL3-native-arm64
        path: output/
