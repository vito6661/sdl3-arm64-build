name: Build (aarch64) usando SDL3 pré-compilado

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  SDL3_VERSION: "3.4.10"
  SDL3_RPM_URL: "https://cdn.openmamba.org/pub/openmamba/base/RPMS.aarch64/libsdl3-3.4.10-1mamba.aarch64.rpm"
  SDL3_DEVEL_RPM_URL: "https://cdn.openmamba.org/pub/openmamba/base/RPMS.aarch64/libsdl3-devel-3.4.10-1mamba.aarch64.rpm"

jobs:
  build-aarch64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do seu projeto
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      #  Cross-compiler — disponível nos runners ubuntu sem repositório arm64
      # ------------------------------------------------------------------ #
      - name: Instalar cross-compiler aarch64
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            cmake \
            ninja-build \
            pkg-config

      # ------------------------------------------------------------------ #
      #  Baixar os dois RPMs do CDN oficial openmamba                       #
      # ------------------------------------------------------------------ #
      - name: Baixar RPMs do SDL3 (openmamba aarch64)
        run: |
          mkdir -p /tmp/sdl3-rpm
          curl -fsSL "${{ env.SDL3_RPM_URL }}"       -o /tmp/sdl3-rpm/libsdl3.rpm
          curl -fsSL "${{ env.SDL3_DEVEL_RPM_URL }}" -o /tmp/sdl3-rpm/libsdl3-devel.rpm
          ls -lh /tmp/sdl3-rpm/

      # ------------------------------------------------------------------ #
      #  Extrair ambos os RPMs para o sysroot (Python puro, sem rpm2cpio)   #
      # ------------------------------------------------------------------ #
      - name: Extrair SDL3 dos RPMs para o sysroot
        run: |
          sudo mkdir -p /opt/aarch64-sysroot

          python3 << 'PYEOF'
          import gzip, os, struct

          SYSROOT = "/opt/aarch64-sysroot"

          def extract_rpm(rpm_path):
              data = open(rpm_path, "rb").read()
              gz_off = data.find(b'\x1f\x8b')
              if gz_off == -1:
                  raise RuntimeError(f"Payload gzip não encontrado em {rpm_path}")
              raw   = gzip.decompress(data[gz_off:])
              pos   = 0
              count = 0
              while pos < len(raw) - 6:
                  magic = raw[pos:pos+6]
                  if magic not in (b'070701', b'070702'):
                      break
                  fields     = [int(raw[pos+6+i*8:pos+6+i*8+8], 16) for i in range(13)]
                  namesize   = fields[11]
                  filesize   = fields[6]
                  name_start = pos + 110
                  name       = raw[name_start:name_start+namesize-1].decode(errors='replace')
                  hdr_end    = (name_start + namesize + 3) & ~3
                  data_end   = hdr_end + filesize

                  if name == 'TRAILER!!!':
                      break

                  rel  = name.lstrip('./')
                  dest = os.path.join(SYSROOT, rel)

                  if filesize > 0:
                      os.makedirs(os.path.dirname(dest), exist_ok=True)
                      with open(dest, 'wb') as f:
                          f.write(raw[hdr_end:data_end])
                      os.chmod(dest, 0o755 if (fields[1] & 0o111) else 0o644)
                      count += 1
                      print(f"  + {rel}")

                  pos = (data_end + 3) & ~3

              print(f"  => {count} arquivos extraídos de {os.path.basename(rpm_path)}")

          extract_rpm("/tmp/sdl3-rpm/libsdl3.rpm")
          extract_rpm("/tmp/sdl3-rpm/libsdl3-devel.rpm")
          PYEOF

          # Symlinks esperados pelo linker
          sudo ln -sf libSDL3.so.0.4.10 /opt/aarch64-sysroot/usr/lib64/libSDL3.so.0 2>/dev/null || true
          sudo ln -sf libSDL3.so.0.4.10 /opt/aarch64-sysroot/usr/lib64/libSDL3.so   2>/dev/null || true

          echo ""
          echo "=== Sysroot SDL3 ==="
          find /opt/aarch64-sysroot/usr -name '*SDL3*' | sort

      # ------------------------------------------------------------------ #
      #  Configurar CMake apontando para o sysroot                          #
      # ------------------------------------------------------------------ #
      - name: Configurar CMake (cross-compile aarch64)
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/opt/aarch64-sysroot/usr \
            -DCMAKE_FIND_ROOT_PATH=/opt/aarch64-sysroot \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ONLY
        env:
          PKG_CONFIG_PATH: /opt/aarch64-sysroot/usr/lib64/pkgconfig
          PKG_CONFIG_LIBDIR: /opt/aarch64-sysroot/usr/lib64/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /opt/aarch64-sysroot

      - name: Build
        run: cmake --build build --parallel

      # ------------------------------------------------------------------ #
      #  Verificação: confirma que o binário é realmente aarch64            #
      # ------------------------------------------------------------------ #
      - name: Verificar arquitetura do binário gerado
        run: |
          find build -type f \( -name "*.so*" -o -executable \) \
            ! -name "*.cmake" ! -name "*.ninja" ! -name "Makefile" \
            | head -10 | while read f; do
              echo "--- $f ---"
              file "$f"
              aarch64-linux-gnu-readelf -h "$f" 2>/dev/null \
                | grep -E 'Class|Machine' || true
            done

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: meu-projeto-aarch64
          path: build/
          if-no-files-found: error
          retention-days: 7
