name: Build SDL3 ARM64

on:
workflow_dispatch:

jobs:
build-arm64:
runs-on: ubuntu-22.04

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Enable ARM64 Architecture
    run: |
      sudo dpkg --add-architecture arm64
      sudo apt-get update

  - name: Install Build Tools
    run: |
      sudo apt-get install -y \
        build-essential \
        git \
        cmake \
        ninja-build \
        pkg-config \
        gcc-aarch64-linux-gnu \
        g++-aarch64-linux-gnu \
        binutils-aarch64-linux-gnu

  - name: Install ARM64 Dependencies
    run: |
      sudo apt-get install -y \
        libc6-dev:arm64 \
        libdrm-dev:arm64 \
        libgbm-dev:arm64 \
        libegl1-mesa-dev:arm64 \
        libgles2-mesa-dev:arm64 \
        libasound2-dev:arm64 \
        libudev-dev:arm64 \
        libdbus-1-dev:arm64

  - name: Clone SDL3
    run: |
      git clone --depth 1 https://github.com/libsdl-org/SDL.git SDL

  - name: Configure SDL3
    run: |
      mkdir -p SDL/build
      cd SDL/build

      export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
      export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig

      cmake .. \
        -G Ninja \
        -DCMAKE_SYSTEM_NAME=Linux \
        -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
        -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
        -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
        -DCMAKE_BUILD_TYPE=Release \
        -DSDL_SHARED=ON \
        -DSDL_STATIC=OFF \
        -DSDL_TESTS=OFF \
        -DSDL_EXAMPLES=OFF \
        -DSDL_X11=OFF \
        -DSDL_WAYLAND=OFF \
        -DSDL_KMSDRM=ON \
        -DSDL_OPENGLES=ON \
        -DSDL_HIDAPI=OFF

  - name: Build SDL3
    run: |
      cd SDL/build
      ninja

  - name: Verify Binary
    run: |
      cd SDL/build

      echo "=== FILE ==="
      file libSDL3.so

      echo "=== ARCH ==="
      aarch64-linux-gnu-readelf -h libSDL3.so | grep Machine

      echo "=== KMSDRM ==="
      strings libSDL3.so | grep -i kmsdrm || true

  - name: Package SDL3
    run: |
      mkdir -p output
      find SDL/build -name "libSDL3.so*" -exec cp {} output/ \;
      ls -lah output

  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: SDL3-ARM64
      path: output/
